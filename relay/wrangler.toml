name = "crossclawd"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# Uncomment and set once you own the domain:
# routes = [
#   { pattern = "crossclawd.com/*", zone_name = "crossclawd.com" },
#   { pattern = "www.crossclawd.com/*", zone_name = "crossclawd.com" },
# ]

# Create this KV namespace with:
#   wrangler kv:namespace create "KV"
# then paste the id below
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
ENVIRONMENT = "production"
